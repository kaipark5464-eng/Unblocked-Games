<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:system-ui,Arial;margin:0;background:#0f172a;color:white;}
header{background:#020617;padding:16px 30px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.4);}
.logo{font-size:20px;font-weight:700;}
.search{padding:8px 12px;border-radius:6px;border:none;width:200px;}
.container{padding:30px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px;}
.card{background:#1e293b;border-radius:10px;overflow:hidden;cursor:pointer;transition:.2s;}
.card:hover{transform:scale(1.04);box-shadow:0 10px 25px rgba(0,0,0,.4);}
.card img{width:100%;height:140px;object-fit:cover;}
.card h3{font-size:14px;padding:10px;margin:0;text-align:center;}
#gamePage{display:none;height:calc(100vh - 80px);flex-direction:column;}
.gameTop{display:flex;gap:10px;padding:10px;background:#020617;}
button{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;background:#2563eb;color:white;}
iframe{flex:1;border:none;width:100%;}
.loading{text-align:center;opacity:.6;padding:40px;}
</style>
</head>
<body>

<header>
  <div class="logo">🎮 SuperVersion Games</div>
  <input class="search" id="search" placeholder="Search games...">
</header>

<div class="container">
<div id="gamesPage">
    <div class="loading">Loading games...</div>
    <div class="grid" id="gamesGrid"></div>
</div>

<div id="gamePage">
    <div class="gameTop">
      <button onclick="goHome()">← Back</button>
      <button onclick="fullscreen()">Fullscreen</button>
    </div>
    <iframe id="gameFrame"></iframe>
</div>
</div>

// =====================
// RENDER & INTERACTION
// =====================
function renderGames(list){
  const grid=document.getElementById("gamesGrid");
  grid.innerHTML="";
  list.forEach(game=>{
    const card=document.createElement("div");
    card.className="card";
    card.onclick=()=>openGame(game);
    card.innerHTML=`<img src="${game.icon}" alt="${game.name}"><h3>${game.name}</h3>`;
    grid.appendChild(card);
  });
  document.querySelector(".loading").style.display="none";
}

function openGame(game){
  document.getElementById("gamesPage").style.display="none";
  document.getElementById("gamePage").style.display="flex";
  document.getElementById("gameFrame").src = game.url;
}

function goHome(){
  document.getElementById("gamePage").style.display="none";
  document.getElementById("gamesPage").style.display="block";
  document.getElementById("gameFrame").src="";
}

function fullscreen(){
  const frame=document.getElementById("gameFrame");
  if(frame.requestFullscreen) frame.requestFullscreen();
}

document.getElementById("search").addEventListener("input", e=>{
  const term=e.target.value.toLowerCase();
  const filtered=games.filter(g=>g.name.toLowerCase().includes(term));
  renderGames(filtered);
});

renderGames(games);
